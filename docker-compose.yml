services:
  app:
    container_name: metamcp
    image: ghcr.io/metatool-ai/metamcp:latest
    pull_policy: always
    ports:
      - "127.0.0.1:12008:12008"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-metamcp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-m3t4mcp}
      POSTGRES_DB: ${POSTGRES_DB:-metamcp_db}
      DATABASE_URL: postgresql://${POSTGRES_USER:-metamcp_user}:${POSTGRES_PASSWORD:-m3t4mcp}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-metamcp_db}
      APP_URL: ${APP_URL:-http://localhost:12008}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:12008}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-your-super-secret-key-change-this-in-production}
      TRANSFORM_LOCALHOST_TO_DOCKER_INTERNAL: ${TRANSFORM_LOCALHOST_TO_DOCKER_INTERNAL:-true}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-errors-only}
      BOOTSTRAP_ENABLE: ${BOOTSTRAP_ENABLE:-false}
      BOOTSTRAP_FAIL_HARD: ${BOOTSTRAP_FAIL_HARD:-false}
      BOOTSTRAP_DEBUG: ${BOOTSTRAP_DEBUG:-false}
      BOOTSTRAP_DISABLE_REGISTRATION_UI: ${BOOTSTRAP_DISABLE_REGISTRATION_UI:-false}
      BOOTSTRAP_DISABLE_REGISTRATION_SSO: ${BOOTSTRAP_DISABLE_REGISTRATION_SSO:-false}
      BOOTSTRAP_WARN_PASSWORD_CHANGE: ${BOOTSTRAP_WARN_PASSWORD_CHANGE:-false}
      BOOTSTRAP_RECREATE_USER: ${BOOTSTRAP_RECREATE_USER:-false}
      BOOTSTRAP_DELETE_OTHER_USERS: ${BOOTSTRAP_DELETE_OTHER_USERS:-false}
      BOOTSTRAP_PRESERVE_API_KEYS: ${BOOTSTRAP_PRESERVE_API_KEYS:-false}
      BOOTSTRAP_ONLY_FIRST_RUN: ${BOOTSTRAP_ONLY_FIRST_RUN:-false}
      BOOTSTRAP_USERS: ${BOOTSTRAP_USERS:-}
      BOOTSTRAP_NAMESPACES: ${BOOTSTRAP_NAMESPACES:-}
      BOOTSTRAP_ENDPOINTS: ${BOOTSTRAP_ENDPOINTS:-}
      BOOTSTRAP_API_KEYS: ${BOOTSTRAP_API_KEYS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - metamcp-network

  postgres:
    image: postgres:16-alpine
    container_name: metamcp-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metamcp_db}
      POSTGRES_USER: ${POSTGRES_USER:-metamcp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-m3t4mcp}
    ports:
      - "127.0.0.1:9433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metamcp_user} -d ${POSTGRES_DB:-metamcp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - metamcp-network

volumes:
  postgres_data:
    driver: local

networks:
  metamcp-network:
    driver: bridge
